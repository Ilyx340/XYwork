<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>悄悄话</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            color: white;
            touch-action: manipulation;
        }

        /* 背景层容器 */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* 基础背景：黑色 + 暗紫色渐变 (不断流动) */
        .bg-base {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, #1a0b2e, #000000);
            background-size: 200% 200%;
            animation: galaxyFlow 12s infinite alternate ease-in-out;
        }

        /* 粉色梦幻覆盖层 (初始透明) */
        .bg-pink-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, #ffb6c1, #d896ff);
            opacity: 0;
            transition: opacity 2.8s cubic-bezier(0.22, 0.61, 0.36, 1);
            pointer-events: none;
        }

        @keyframes galaxyFlow {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        /* 主内容区（所有元素不拦截点击） */
        .content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            pointer-events: none;
        }

        /* 中央文案容器 */
        .text-wrapper {
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
            font-size: 2.2rem;
            font-weight: 400;
            line-height: 1.5;
            letter-spacing: 2px;
            text-shadow: 0 4px 20px rgba(255, 130, 180, 0.6);
            transform: translateY(0);
            transition: transform 0.3s ease, opacity 0.5s ease;
            word-break: break-word;
            pointer-events: none;
        }

        /* 隐藏文案（用于最后提问时） */
        .text-wrapper.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* 打字机专属样式 (最后一句) */
        .typewriter-text {
            font-weight: 600;
            background: linear-gradient(145deg, #fff0f5, #ffe2f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px #ff9eb5;
            border-right: 4px solid rgba(255, 200, 230, 0.8);
            white-space: nowrap;
            overflow: hidden;
            animation: blinkCursor 0.8s step-end infinite;
        }

        @keyframes blinkCursor {
            from, to { border-color: transparent; }
            50% { border-color: rgba(255, 200, 230, 0.8); }
        }

        /* 底部提示 (只在可点击时显示) */
        .bottom-hint {
            position: absolute;
            bottom: 15%;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 4px;
            color: rgba(255, 220, 240, 0.9);
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.6s ease, transform 0.3s ease;
            transform: translateY(10px);
            pointer-events: none;
            text-shadow: 0 0 10px #ff9bbd;
            backdrop-filter: blur(2px);
            padding: 8px 0;
        }

        .bottom-hint.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 文案进入动画 */
        .text-enter {
            animation: smoothAppear 0.7s cubic-bezier(0.2, 0.9, 0.3, 1.1) forwards;
        }

        @keyframes smoothAppear {
            0% {
                opacity: 0;
                transform: scale(0.92) translateY(20px);
                filter: blur(8px);
            }
            60% {
                opacity: 0.9;
                transform: scale(1.02) translateY(-2px);
                filter: blur(0);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
                filter: blur(0);
            }
        }

        /* 爱心小点缀 */
        .final-heart {
            margin-top: 30px;
            font-size: 3.5rem;
            animation: heartbeat 1.4s infinite ease-in-out;
            filter: drop-shadow(0 0 15px #ffb0c0);
            opacity: 0;
            transform: scale(0);
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }

        .final-heart.show {
            opacity: 1;
            transform: scale(1);
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.2); }
            30% { transform: scale(1.0); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }

        /* 提问容器 (默认完全隐藏) */
        .question-container {
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            width: 100%;
            max-width: 600px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .question-container.visible {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .question-text {
            font-size: 2.5rem;
            font-weight: 500;
            color: #fff4f9;
            text-shadow: 0 0 30px #ffbcd6;
            margin-bottom: 10px;
            text-align: center;
            background: rgba(255, 240, 250, 0.2);
            backdrop-filter: blur(6px);
            padding: 15px 30px;
            border-radius: 60px;
            border: 1px solid rgba(255, 220, 240, 0.6);
            animation: floatText 2s infinite alternate;
        }

        @keyframes floatText {
            0% { transform: translateY(0); }
            100% { transform: translateY(-5px); }
        }

        .button-group {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            border: none;
            background: linear-gradient(145deg, #ff9bbd, #ff6b97);
            color: white;
            font-size: 2.2rem;
            font-weight: 600;
            padding: 18px 50px;
            border-radius: 60px;
            box-shadow: 0 15px 30px -5px #a13155, 0 0 0 2px #ffeef5 inset;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.25s ease;
            min-width: 160px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .btn.secondary {
            background: rgba(255, 245, 250, 0.25);
            backdrop-filter: blur(10px);
            color: #ffeef4;
            border: 2px solid #ffc1d4;
            box-shadow: 0 10px 20px -5px #4a2536;
        }

        .btn:hover {
            transform: translateY(-6px) scale(1.05);
            box-shadow: 0 25px 35px -5px #c13567, 0 0 0 3px #fff4fa inset;
        }

        .btn.secondary:hover {
            background: rgba(255, 220, 240, 0.4);
            color: white;
            border-color: #ffdbea;
        }

        /* 临时挽回提示 */
        .plead-message {
            font-size: 1.3rem;
            color: #ffeef2;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            padding: 12px 24px;
            border-radius: 40px;
            border-left: 4px solid #ffa5c3;
            transition: opacity 0.3s;
            margin-top: 10px;
            text-align: center;
        }

        .plead-message.hide {
            opacity: 0;
        }

        /* 好耶界面 */
        .success-message {
            font-size: 3.5rem;
            font-weight: 600;
            background: linear-gradient(145deg, #fff5fa, #ffd9ec);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px #ffa7c4;
            margin-top: 30px;
            animation: bounceIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 0.9; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 移动端调整 */
        @media (max-width: 550px) {
            .text-wrapper { font-size: 1.8rem; }
            .question-text { font-size: 1.9rem; }
            .btn { font-size: 1.8rem; padding: 14px 30px; min-width: 130px; }
            .bottom-hint { font-size: 0.9rem; bottom: 12%; }
        }
    </style>
</head>
<body>
    <div class="bg-container">
        <div class="bg-base"></div>
        <div class="bg-pink-overlay" id="pinkOverlay"></div>
    </div>

    <div class="content">
        <div class="text-wrapper" id="textDisplay"></div>
        <div class="bottom-hint" id="hint">✨ 轻触继续 ✨</div>
        <div class="final-heart" id="finalHeart">❤️</div>

        <!-- 提问容器 (初始完全隐藏) -->
        <div class="question-container" id="questionContainer">
            <div class="question-text" id="questionText">愿意做我女朋友吗？</div>
            <div class="button-group">
                <button class="btn" id="yesBtn">YES</button>
                <button class="btn secondary" id="noBtn">NO</button>
            </div>
            <div class="plead-message hide" id="pleadMsg"></div>
        </div>

        <!-- 成功好耶 (初始隐藏) -->
        <div class="success-message" id="successMsg" style="display: none;">好耶！🎉</div>
    </div>

    <script>
        (function() {
            // 🌟 新文案 (加入了笑容和对话)
            const sentences = [
                "遇见你之前，我没想过未来。",
                "遇见你之后，我没想过别人。",
                "想把你藏进星光里，走到哪里都亮亮的。",
                "你是我所有的心动和坚定不移。",
                "你可爱的笑容融化了我的心，每天和你对话的时候我都很心动。",  // 新增
                "所以…",           // 索引5：触发背景切换
                "我喜欢你"          // 索引6：打字机效果
            ];

            // 挽回话语库
            const pleadMessages = [
                "😢 再考虑一下嘛～",
                "🥺 我会很乖的！",
                "💔 不要这么绝情嘛……",
                "😭 再给我一次机会！",
                "💞 你忍心拒绝吗？",
                "🌟 我保证天天让你开心！",
                "🍀 选YES有惊喜哦～"
            ];

            let currentIndex = -1;
            let clickEnabled = true;
            let timer = null;
            let typeTimer = null;
            let questionActive = false;  // 是否已进入提问模式

            const textDisplay = document.getElementById('textDisplay');
            const hintEl = document.getElementById('hint');
            const pinkOverlay = document.getElementById('pinkOverlay');
            const finalHeart = document.getElementById('finalHeart');
            const questionContainer = document.getElementById('questionContainer');
            const questionText = document.getElementById('questionText');
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            const pleadMsg = document.getElementById('pleadMsg');
            const successMsg = document.getElementById('successMsg');

            function clearAllTimers() {
                if (timer) { clearTimeout(timer); timer = null; }
                if (typeTimer) { clearInterval(typeTimer); typeTimer = null; }
            }

            function enableClickAndHint() {
                clickEnabled = true;
                hintEl.classList.add('visible');
            }

            function disableClickAndHint() {
                clickEnabled = false;
                hintEl.classList.remove('visible');
            }

            function setTextWithAnimation(text, isTypewriter = false) {
                textDisplay.classList.remove('text-enter');
                void textDisplay.offsetWidth;
                if (isTypewriter) {
                    textDisplay.innerHTML = '';
                    textDisplay.classList.add('typewriter-text');
                } else {
                    textDisplay.classList.remove('typewriter-text');
                    textDisplay.textContent = text || '';
                }
                textDisplay.classList.add('text-enter');
            }

            function startTypewriter(finalText, callback) {
                let index = 0;
                textDisplay.innerHTML = '';
                textDisplay.classList.add('typewriter-text');
                disableClickAndHint();

                typeTimer = setInterval(() => {
                    if (index < finalText.length) {
                        textDisplay.innerHTML += finalText.charAt(index);
                        index++;
                    } else {
                        clearInterval(typeTimer);
                        typeTimer = null;
                        textDisplay.classList.remove('typewriter-text');
                        finalHeart.classList.add('show');
                        if (callback) callback();
                    }
                }, 130);
            }

            // 显示提问界面（并隐藏文案）
            function showQuestion() {
                if (questionActive) return;
                questionActive = true;
                // 隐藏文案区域
                textDisplay.classList.add('hidden');
                // 显示问题容器
                questionContainer.classList.add('visible');
                disableClickAndHint();  // 隐藏底部提示
            }

            // 隐藏提问，显示成功好耶
            function showSuccess() {
                questionContainer.classList.remove('visible');
                successMsg.style.display = 'block';
                finalHeart.classList.add('show'); // 确保爱心显示
            }

            // 随机挽回消息
            function showRandomPlead() {
                const randomIndex = Math.floor(Math.random() * pleadMessages.length);
                pleadMsg.textContent = pleadMessages[randomIndex];
                pleadMsg.classList.remove('hide');
                setTimeout(() => {
                    pleadMsg.classList.add('hide');
                }, 800);
            }

            // 进入下一步（原有逻辑，已适配新索引）
            function goToNextStep() {
                if (!clickEnabled) return;
                if (currentIndex >= sentences.length - 1 && finalHeart.classList.contains('show')) {
                    // 此时应该由点击触发显示提问，而不是继续goToNextStep
                    return;
                }
                clearAllTimers();

                currentIndex++;

                // 最后一句（打字机）
                if (currentIndex === sentences.length - 1) {
                    pinkOverlay.style.opacity = '1';   // 确保粉色背景（之前可能在“所以”已经变过）
                    setTextWithAnimation('', true);
                    startTypewriter(sentences[currentIndex], () => {
                        // 打字机完成，爱心已显示，此时启用点击屏幕以便触发提问
                        enableClickAndHint();
                    });
                    return;
                }

                // 普通句子
                setTextWithAnimation(sentences[currentIndex], false);
                // 背景切换：索引5是“所以…”
                if (currentIndex === 5) {
                    pinkOverlay.style.opacity = '1';
                }

                // 3秒阅读计时
                if (currentIndex < sentences.length - 1) {
                    disableClickAndHint();
                    timer = setTimeout(() => {
                        enableClickAndHint();
                        timer = null;
                    }, 3000);
                }
            }

            // 初始化
            function initFirstScreen() {
                currentIndex = -1;
                clickEnabled = true;
                hintEl.classList.add('visible');
                textDisplay.textContent = '';
                textDisplay.classList.remove('typewriter-text', 'text-enter', 'hidden');
                pinkOverlay.style.opacity = '0';
                finalHeart.classList.remove('show');
                questionContainer.classList.remove('visible');
                pleadMsg.classList.add('hide');
                successMsg.style.display = 'none';
                questionActive = false;
                clearAllTimers();
            }

            // 全局点击监听
            window.addEventListener('click', function(e) {
                // 如果按钮被点击，不触发屏幕点击（按钮事件已stopPropagation）
                // 初始黑屏状态
                if (currentIndex === -1) {
                    goToNextStep();
                    return;
                }

                // 如果已经到最后一句且爱心已显示且可点击且未进入提问，则显示提问
                if (currentIndex >= sentences.length - 1 && finalHeart.classList.contains('show') && clickEnabled && !questionActive) {
                    showQuestion();
                    return;
                }

                // 正常点击下一句（仅当可点击且未进入提问且还没到最后一句）
                if (clickEnabled && !questionActive && currentIndex < sentences.length - 1) {
                    goToNextStep();
                }
            });

            // 按钮事件
            yesBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (!questionActive) return;
                showSuccess();
            });

            noBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (!questionActive) return;
                showRandomPlead();
                noBtn.style.transform = 'scale(0.9)';
                setTimeout(() => { noBtn.style.transform = ''; }, 200);
            });

            // 触摸兼容
            window.addEventListener('touchstart', function(e) {
                // 保持passive
            }, { passive: true });

            // 启动
            initFirstScreen();
        })();
    </script>
</body>
</html>
